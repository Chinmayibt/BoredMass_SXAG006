name: Frontend CI

on:
  push:
    paths:
      - "Auto_scholar/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "Auto_scholar/frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Auto_scholar/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Auto_scholar/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
